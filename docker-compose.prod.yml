version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: shopkart_db_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${DOCKER_USERNAME}/shopkart:latest
    container_name: shopkart_web_prod
    restart: always
    command: >
      sh -c "python manage.py migrate --settings=config.settings.prod &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 config.wsgi:application"
    volumes:
      - media_volume_prod:/app/media
      - static_volume_prod:/app/staticfiles
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: shopkart_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_volume_prod:/app/media
      - static_volume_prod:/app/staticfiles
    depends_on:
      - web

volumes:
  mysql_data_prod:
  media_volume_prod:
  static_volume_prod:
